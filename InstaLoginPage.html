<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
  <title>Instagram Login</title>

  <style>
    *{
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
   html, body{
    height: 100%;
    margin: 0;
}

body{
    background: url("https://tse4.mm.bing.net/th/id/OIP.1fgEVN_ihWgjB1rpnqx6ZQHaEK?rs=1&pid=ImgDetMain&o=7&rm=3") no-repeat center center;
    background-size: cover;
}
    .main{
      margin: auto;
      margin-top: 45px;
      height: 500px;
      width: 420px;
      /* background-color: rgb(236, 230, 223); */
       background-image:url();
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      box-shadow: rgb(131, 169, 109) 0.5px 0.5px 2px 2px;
      border-radius: 10px;
    }
    .main:hover{
      background-image: url(https://tse2.mm.bing.net/th/id/OIP.iFAsncMNr14QzwMn3L6XAgHaEK?rs=1&pid=ImgDetMain&o=7&rm=3);
      transform: scale(1.05);
    }

    h1{
      font-family: cursive;
      font-weight: bold;
      margin-bottom: 30px;
    }

    .input{
      width: 300px;
    }

    .input input{
      width: 100%;
      height: 40px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
      margin-bottom: 15px;
    }

    button{
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 5px;
      background-color: #2c4c61;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }
    #password{
      margin-bottom:0;
    }

    button:hover{
      background-color: #2185cc;
    }
    .logo{
      height: 90px;
      width: 80px;
      color: rgb(212, 18, 18);
      font-size: 70px;
      display: inline-block;
    }
    .or{
  display: flex;
  align-items: center;
  width: 300px;
  margin: 20px 0;
}

.or hr{
  flex: 1;
  border: none;
  border-top: 1px solid rgb(34, 29, 34);
}

.or span{
  margin: 0 10px;
  color: rgba(18, 28, 29, 0.996);
  font-weight: bold;
}
.forgot{
  text-align: right;
  color: #bde11d;
  margin-top: 4px;
  margin-bottom: 7px;
} 
#facebook{
  font-size: 20px;
  float: left;
  background-color: #3e1de1;
  color: #f4f4f5;
}
h5{
  display: inline;
  color: white;
  /* vertical-align: middle; */
}
h4 span{
  color:rgb(0, 0, 159);
}
.Singup{
  margin: 30px;
  margin-bottom: 0;
}
  </style>
</head>
<body>

  <div class="main">
    <div class="logo">
      <i class="fa-brands fa-instagram"></i>
    </div>
    <h1>Instagram</h1>

    <div class="input">
      <input type="text" placeholder="Username, email or mobile number">
      <input type="password" placeholder="Password" id="password">
      <h3 class="forgot">forgot password?</h3>
      <button>Log In</button>
    </div>
   <div class="or">
    <hr>
    <span>OR</span>
    <hr>
   </div>
  
   <div id="facebook">
    <i class="fa-brands fa-facebook"id="facebook"></i>
    <h5>Continue With facebook</h5>
    </div>
    <div class="Singup">
    <h4>Don't have an account?<span>Sing up</span></h4>
    </div>
    </div>
  
    
</body>
</html>
