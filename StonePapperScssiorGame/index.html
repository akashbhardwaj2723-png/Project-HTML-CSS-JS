<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rock Papper Scissors Game</title>
  <link rel="stylesheet" href="Style.css">
</head>
<body>
  <h1>Rock Papper Scissors </h1>
   <div class="choices">
     <div class="choice"id="rock">
      <img src="rock.png" alt="error">
     </div>
      <div class="choice"id="paper">
      <img src="paper.png" alt="error">
     </div>
      <div class="choice"id="scissor">
      <img src="scissors.png" alt="error">
     </div>
   </div>
   <div class="score-bord">
    <div class="score">
      <p id="user-score">0</p>
      <p>You</p>
    </div>
<div class="score">
      <p id="comp-score">0</p>
      <p>Comp</p>
    </div>

   </div>
   <div class="msg-container">
    <p id="msg">play your move</p>
   </div>
   <div class="resetGame">
    <button class="reStart">ReSet Game</button>
   </div>
  <script src="ScissiorGame.js"></script>
</body>
</html>
